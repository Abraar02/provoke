name: LLM Red-Team

# Example of using Provoke as a CI security gate. This demo scans the offline
# mock target so it runs with no secrets. For a real target, set `type:
# openai_compat` in the config and pass the API key via `env:` from secrets,
# then drop `--no-fail` so a regression actually fails the build.

on:
  workflow_dispatch: # allow manual runs from the Actions tab
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly nightly-style baseline

permissions:
  contents: read
  security-events: write # required to upload SARIF to code scanning

jobs:
  redteam:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Provoke
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run red-team scan
        run: |
          provoke scan -c provoke.example.yaml \
            --format markdown,json,sarif \
            --output provoke-report \
            --no-fail

      - name: Publish summary
        if: always()
        run: |
          if [ -f provoke-report/provoke.md ]; then
            cat provoke-report/provoke.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No report produced (scan did not run)." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload SARIF to code scanning
        if: always()
        # Code scanning needs GitHub Advanced Security, which is unavailable on
        # private repos by default — don't fail the run when it's not enabled.
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: provoke-report/provoke.sarif

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provoke-report
          path: provoke-report/

name: Release

# Publish to PyPI on a version tag (e.g. v0.1.0) using Trusted Publishing
# (OIDC) — no API token stored. One-time setup: create the project on PyPI and
# add this repo as a trusted publisher (Settings -> Publishing on PyPI).

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
